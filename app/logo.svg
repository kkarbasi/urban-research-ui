<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="skyline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="trendLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Building cluster -->
  <rect x="18" y="42" width="14" height="48" rx="1.5" fill="url(#skyline)"/>
  <rect x="36" y="22" width="14" height="68" rx="1.5" fill="url(#skyline)"/>
  <rect x="54" y="50" width="14" height="40" rx="1.5" fill="url(#skyline)"/>
  <rect x="72" y="14" width="16" height="76" rx="1.5" fill="url(#skyline)"/>
  <rect x="92" y="34" width="14" height="56" rx="1.5" fill="url(#skyline)"/>

  <!-- Window dots -->
  <rect x="23" y="50" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="23" y="60" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.5"/>
  <rect x="23" y="70" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="41" y="30" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.6"/>
  <rect x="41" y="40" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="41" y="50" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.5"/>
  <rect x="41" y="60" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="41" y="70" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.6"/>
  <rect x="59" y="56" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="59" y="66" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.5"/>
  <rect x="59" y="76" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="77" y="22" width="5" height="4" rx="0.5" fill="#e0f2fe" opacity="0.5"/>
  <rect x="77" y="32" width="5" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="77" y="42" width="5" height="4" rx="0.5" fill="#e0f2fe" opacity="0.6"/>
  <rect x="77" y="52" width="5" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="77" y="62" width="5" height="4" rx="0.5" fill="#e0f2fe" opacity="0.5"/>
  <rect x="77" y="72" width="5" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="97" y="42" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="97" y="52" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.5"/>
  <rect x="97" y="62" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.7"/>
  <rect x="97" y="72" width="4" height="4" rx="0.5" fill="#e0f2fe" opacity="0.6"/>

  <!-- Trend line cutting across buildings -->
  <polyline
    points="12,78 30,65 48,70 66,45 84,30 108,20"
    stroke="url(#trendLine)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Trend line end dot -->
  <circle cx="108" cy="20" r="4" fill="#22d3ee"/>

  <!-- Ground line -->
  <line x1="10" y1="90" x2="114" y2="90" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Text: URBAN -->
  <text x="130" y="55" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="3" fill="#1e3a5f">URBAN</text>

  <!-- Text: RESEARCH -->
  <text x="130" y="82" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="8" fill="#0ea5e9">RESEARCH</text>
</svg>
